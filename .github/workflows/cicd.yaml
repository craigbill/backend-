

name: Build and push docker image 


on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout out the repository
      uses: actions/checkout@v4

    - name: Docker Build
      run: |
        echo"${{ vars.ENV_FILE }}" > .env 
        ls -la 
        docker build -t netflix_backend:latest